server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-rendered .html files for extensionless URLs (e.g. /overview → overview.html)
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Long-lived cache for hashed assets generated by vite
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for images and fonts
    location ~* \.(?:ico|png|jpg|jpeg|webp|svg|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
